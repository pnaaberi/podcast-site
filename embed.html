<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jake's Daily Build</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#0c0c0c;color:#fafafa;overflow:hidden}
    .embed{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#18181f;border:1px solid #27272a;border-radius:12px;max-width:480px;margin:0 auto}
    .cover{width:64px;height:64px;min-width:64px;border-radius:8px;background:#141418;border:1px solid #27272a;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .cover img{width:100%;height:100%;object-fit:cover}
    .info{flex:1;min-width:0}
    .ep-num{font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:#c05030;margin-bottom:2px}
    .ep-title{font-size:0.88rem;font-weight:600;line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ep-show{font-size:0.65rem;color:#71717a;margin-bottom:6px}
    .player-row{display:flex;align-items:center;gap:8px}
    .pbtn{width:36px;height:36px;min-width:36px;border-radius:50%;border:none;background:#c05030;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s}
    .pbtn:hover{transform:scale(1.08)}
    .pbtn svg{width:14px;height:14px;fill:#fff}
    .pbar{flex:1;height:36px;display:flex;align-items:center;cursor:pointer}
    .ptrack{width:100%;height:4px;background:#27272a;border-radius:2px;position:relative;overflow:hidden}
    .pfill{height:100%;background:#c05030;border-radius:2px;width:0%;transition:width 0.1s linear}
    .ptime{font-size:0.65rem;color:#71717a;font-variant-numeric:tabular-nums;min-width:36px;text-align:right}
    .branding{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
    .branding a{font-size:0.55rem;color:#555;text-decoration:none;transition:color 0.15s}
    .branding a:hover{color:#c05030}
    .share-btn{background:none;border:1px solid #27272a;color:#71717a;font-size:0.58rem;font-family:inherit;padding:4px 8px;border-radius:4px;cursor:pointer;transition:all 0.15s}
    .share-btn:hover{border-color:#c05030;color:#c05030}
    .share-btn.copied{border-color:#22c55e;color:#22c55e}
    .error{padding:20px;text-align:center;color:#71717a;font-size:0.8rem}
    audio{display:none}
  </style>
</head>
<body>
  <div id="root"></div>
  <audio id="audio" preload="metadata"></audio>

  <script>
    const params = new URLSearchParams(location.search);
    const epNum = parseInt(params.get('ep') || '0', 10);
    const root = document.getElementById('root');
    const audioEl = document.getElementById('audio');

    // Base URL detection
    const base = location.origin + location.pathname.replace(/\/embed\.html.*/, '');

    fetch('episodes.json')
      .then(r => r.json())
      .then(eps => {
        const today = new Date().toISOString().slice(0, 10);
        const ep = eps.find(e => e.epNum === epNum);
        if (!ep || isNaN(epNum) || epNum < 0 || ep.date > today) {
          root.innerHTML = '<div class="error">Episode not found</div>';
          return;
        }
        render(ep);
      })
      .catch(() => {
        root.innerHTML = '<div class="error">Could not load episodes</div>';
      });

    function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML.replace(/"/g,'&quot;')}

    function render(ep) {
      const padNum = String(ep.epNum).padStart(3, '0');
      const safeTitle = esc(ep.title);
      const safeDuration = esc(ep.duration || '');

      root.innerHTML = `
        <div class="embed">
          <div class="cover">
            <img src="audio/cover.png" alt="Jake's Daily Build" width="64" height="64">
          </div>
          <div class="info">
            <div class="ep-num">EP${padNum}${ep.type === 'interview' ? ' · Interview' : ''}</div>
            <div class="ep-title" title="${safeTitle}">${safeTitle}</div>
            <div class="ep-show">Jake's Daily Build · ${safeDuration}</div>
            <div class="player-row">
              <button class="pbtn" id="playBtn" aria-label="Play episode">
                <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
              </button>
              <div class="pbar" id="pbar">
                <div class="ptrack"><div class="pfill" id="pfill"></div></div>
              </div>
              <span class="ptime" id="ptime">0:00</span>
            </div>
            <div class="branding">
              <a href="${base}/" target="_blank" rel="noopener">🎙️ Jake's Daily Build</a>
              <button class="share-btn" id="shareBtn">Copy embed</button>
            </div>
          </div>
        </div>
      `;

      // Audio
      audioEl.src = 'audio/' + ep.file;
      const playBtn = document.getElementById('playBtn');
      const pfill = document.getElementById('pfill');
      const ptime = document.getElementById('ptime');
      const pbar = document.getElementById('pbar');
      let playing = false;

      const playSVG = '<svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
      const pauseSVG = '<svg viewBox="0 0 24 24"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>';

      playBtn.addEventListener('click', () => {
        if (playing) { audioEl.pause(); } else { audioEl.play(); }
      });

      audioEl.addEventListener('play', () => { playing = true; playBtn.innerHTML = pauseSVG; });
      audioEl.addEventListener('pause', () => { playing = false; playBtn.innerHTML = playSVG; });
      audioEl.addEventListener('timeupdate', () => {
        if (!audioEl.duration) return;
        pfill.style.width = (audioEl.currentTime / audioEl.duration * 100) + '%';
        const rem = audioEl.duration - audioEl.currentTime;
        const m = Math.floor(rem / 60);
        const s = Math.floor(rem % 60);
        ptime.textContent = '-' + m + ':' + String(s).padStart(2, '0');
      });

      pbar.addEventListener('click', (e) => {
        if (!audioEl.duration) return;
        const rect = pbar.getBoundingClientRect();
        audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
      });

      // Share / embed code
      const shareBtn = document.getElementById('shareBtn');
      shareBtn.addEventListener('click', () => {
        const embedCode = `<iframe src="${base}/embed.html?ep=${ep.epNum}" width="480" height="140" frameborder="0" style="border-radius:12px" allow="autoplay"></iframe>`;
        navigator.clipboard.writeText(embedCode).then(() => {
          shareBtn.textContent = 'Copied!';
          shareBtn.classList.add('copied');
          setTimeout(() => {
            shareBtn.textContent = 'Copy embed';
            shareBtn.classList.remove('copied');
          }, 2000);
        });
      });
    }
  </script>
</body>
</html>
